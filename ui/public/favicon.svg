<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 210 205" role="img" aria-label="BETK">
  <!-- B — gray, top left -->
  <rect x="6" y="26" width="86" height="86" rx="11" fill="#929292"/>
  <text x="49" y="86" font-family="'Arial Black',Arial,sans-serif" font-weight="900" font-size="54" fill="white" text-anchor="middle">B</text>

  <!-- E — teal, top right -->
  <rect x="118" y="6" width="86" height="86" rx="11" fill="#3ECDC6"/>
  <text x="161" y="66" font-family="'Arial Black',Arial,sans-serif" font-weight="900" font-size="54" fill="white" text-anchor="middle">E</text>

  <!-- T — red, bottom left -->
  <rect x="6" y="113" width="86" height="86" rx="11" fill="#D84F52"/>
  <text x="49" y="173" font-family="'Arial Black',Arial,sans-serif" font-weight="900" font-size="54" fill="white" text-anchor="middle">T</text>

  <!-- K — navy, bottom right -->
  <rect x="118" y="113" width="86" height="86" rx="11" fill="#1C3D5E"/>
  <text x="161" y="173" font-family="'Arial Black',Arial,sans-serif" font-weight="900" font-size="54" fill="white" text-anchor="middle">K</text>

  <!-- B → E connection -->
  <circle cx="92" cy="46" r="5" fill="#111"/>
  <circle cx="118" cy="32" r="5" fill="#111"/>
  <line x1="92" y1="46" x2="118" y2="32" stroke="#111" stroke-width="3.5" stroke-dasharray="9,6" stroke-linecap="round"/>

  <!-- E → T connection -->
  <circle cx="138" cy="92" r="5" fill="#111"/>
  <circle cx="62" cy="113" r="5" fill="#111"/>
  <line x1="138" y1="92" x2="62" y2="113" stroke="#111" stroke-width="3.5" stroke-dasharray="9,6" stroke-linecap="round"/>

  <!-- T → K connection -->
  <circle cx="92" cy="155" r="5" fill="#111"/>
  <circle cx="118" cy="163" r="5" fill="#111"/>
  <line x1="92" y1="155" x2="118" y2="163" stroke="#111" stroke-width="3.5" stroke-dasharray="9,6" stroke-linecap="round"/>
</svg>
